<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>退休目標計算器 | 保險媽咪的退休實驗室</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS 變數：浪漫溫暖色系 */
        :root {
            --cream: #fdf8f2;
            --rose: #d4867a;
            --rose-d: #b5635a;
            --sage: #8fab90;
            --text: #564743;
            --card-bg: rgba(255, 255, 255, 0.92);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans TC', sans-serif;
        }

        body {
            background-color: var(--cream);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--text);
            font-weight: 700;
        }

        h1 span {
            color: var(--rose);
            font-style: italic;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #8c7671;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(212, 134, 122, 0.1);
            border: 1px solid rgba(212, 134, 122, 0.15);
            text-align: left;
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.1rem;
            color: var(--rose-d);
            text-align: center;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .label-title {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .value-display {
            color: var(--rose);
            font-weight: 700;
        }

        .input-wrap {
            position: relative;
            background: #fff;
            border-radius: 12px;
            padding: 10px 15px;
            border: 1px solid #e0d5d3;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-wrap input[type="number"] {
            border: none;
            outline: none;
            width: 100%;
            font-size: 1.2rem;
            color: var(--text);
            font-weight: 700;
        }

        input[type="range"] {
            width: 100%;
            margin-top: 10px;
            -webkit-appearance: none;
            appearance: none;
            background: #ebdcd9;
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--rose);
            cursor: pointer;
            transition: transform 0.1s;
        }

        /* 結果區塊樣式 */
        .result-section {
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .result-section.active {
            display: block;
            opacity: 1;
        }

        .result-card {
            background: #fff;
            border-left: 6px solid var(--sage);
            border-radius: 16px;
            padding: 20px;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed #f0e6e4;
        }

        .result-row:last-child {
            border-bottom: none;
        }

        .result-val {
            font-weight: 700;
            color: var(--sage);
            font-size: 1.1rem;
        }

        .highlight-box {
            background: #faf4f0;
            border: 1px solid #f3e5df;
            border-radius: 12px;
            padding: 12px;
            margin-top: 10px;
        }
        
        .highlight-title {
            font-size: 0.9rem;
            color: var(--rose-d);
            font-weight: 700;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>退休目標計算器</h1>
        <div class="subtitle">讓未來的自己感謝現在的你</div>

        <div class="card">
            <div class="section-title">能安穩退休的日子還有多久?</div>

            <div class="input-group">
                <div class="label-row">
                    <span class="label-title">🌱 目前年齡</span>
                    <span class="value-display"><span id="val-age">30</span> 歲</span>
                </div>
                <div class="input-wrap">
                    <span>👤</span>
                    <input type="number" id="num-age" value="30" min="0" max="100">
                </div>
                <input type="range" id="range-age" min="0" max="100" value="30">
            </div>

            <div class="input-group">
                <div class="label-row">
                    <span class="label-title">🌸 預計退休年齡</span>
                    <span class="value-display"><span id="val-retire">60</span> 歲</span>
                </div>
                <div class="input-wrap">
                    <span>🏡</span>
                    <input type="number" id="num-retire" value="60" min="0" max="100">
                </div>
                <input type="range" id="range-retire" min="0" max="100" value="60">
            </div>

            <div class="input-group">
                <div class="label-row">
                    <span class="label-title">🍃 預估壽命</span>
                    <span class="value-display"><span id="val-death">85</span> 歲</span>
                </div>
                <div class="input-wrap">
                    <span>⏳</span>
                    <input type="number" id="num-death" value="85" min="0" max="120">
                </div>
                <input type="range" id="range-death" min="0" max="120" value="85">
            </div>

            <div class="input-group">
                <div class="label-row">
                    <span class="label-title">💰 退休後每月生活費 (現值)</span>
                    <span class="value-display"><span id="val-expense">50,000</span> 元</span>
                </div>
                <div class="input-wrap">
                    <span>☕</span>
                    <input type="number" id="num-expense" value="50000" step="5000">
                </div>
            </div>
        </div>

        <div id="result-area" class="result-section">
            <div class="card" style="border-left: 6px solid var(--sage);">
                <div class="section-title" style="color: var(--sage);">你的專屬退休藍圖</div>
                
                <div class="result-card">
                    <div class="result-row">
                        <span>距離退休還有</span>
                        <span class="result-val"><span id="res-years-to-retire">30</span> 年</span>
                    </div>
                    <div class="result-row">
                        <span>退休生活總共</span>
                        <span class="result-val"><span id="res-retirement-years">25</span> 年</span>
                    </div>
                    <div class="result-row">
                        <span>預估需要的退休總準備金</span>
                        <span class="result-val" style="color: var(--rose-d); font-size: 1.3rem;"><span id="res-total-fund">15,000,000</span> 元</span>
                    </div>
                </div>

                <div class="result-card" style="border-left: 6px solid var(--rose); margin-top: 20px;">
                    <div class="section-title" style="color: var(--rose); margin-bottom: 10px;">現在開始，每個月該存多少？</div>
                    
                    <div class="result-row">
                        <span>方式 A：純勞力儲蓄 (0%複利)</span>
                        <span class="result-val" style="color: var(--text);"><span id="res-save-flat">41,666</span> 元/月</span>
                    </div>

                    <div class="highlight-box">
                        <div class="highlight-title">🐣 方式 B：啟動理財金雞母 (7%年化報酬複利)</div>
                        <div class="result-row" style="padding: 4px 0; border: none;">
                            <span style="font-size: 0.95rem; color: #7a6561;">每月僅需提撥：</span>
                            <span class="result-val" style="color: var(--rose-d); font-size: 1.3rem;"><span id="res-save-compound">12,760</span> 元/月</span>
                        </div>
                        <p style="font-size: 0.8rem; color: #9c8480; margin-top: 5px; line-height: 1.4;">
                            * 註：運用複利效應，運用7%的投資理財工具，能少辛苦70%的力氣！
                        </p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const inputs = {
                age: { num: document.getElementById('num-age'), range: document.getElementById('range-age'), txt: document.getElementById('val-age') },
                retire: { num: document.getElementById('num-retire'), range: document.getElementById('range-retire'), txt: document.getElementById('val-retire') },
                death: { num: document.getElementById('num-death'), range: document.getElementById('range-death'), txt: document.getElementById('val-death') },
                expense: { num: document.getElementById('num-expense'), txt: document.getElementById('val-expense') }
            };

            const resultArea = document.getElementById('result-area');

            function setupSync(elementObj) {
                if(!elementObj.range) return;
                elementObj.num.addEventListener('input', function() { elementObj.range.value = this.value; calculateRetirement(); });
                elementObj.range.addEventListener('input', function() { elementObj.num.value = this.value; calculateRetirement(); });
            }

            setupSync(inputs.age);
            setupSync(inputs.retire);
            setupSync(inputs.death);
            inputs.expense.num.addEventListener('input', calculateRetirement);

            function calculateRetirement() {
                const age = parseInt(inputs.age.num.value) || 0;
                const retire = parseInt(inputs.retire.num.value) || 0;
                const death = parseInt(inputs.death.num.value) || 0;
                const expense = parseInt(inputs.expense.num.value) || 0;

                inputs.age.txt.innerText = age;
                inputs.retire.txt.innerText = retire;
                inputs.death.txt.innerText = death;
                inputs.expense.txt.innerText = expense.toLocaleString();

                if (retire > age && death > retire && expense > 0) {
                    const yearsToRetire = retire - age;
                    const retirementYears = death - retire;
                    const totalFund = retirementYears * expense * 12;

                    // 1. 計算純定存（總額 / 總月數）
                    const totalMonths = yearsToRetire * 12;
                    const saveFlat = Math.round(totalFund / totalMonths);

                    // 2. 計算 7% 複利下的每月年金儲蓄金額 (PMT 邏輯)
                    // 公式: PMT = Target * (r / ((1 + r)^n - 1))
                    const annualRate = 0.07;
                    const monthlyRate = annualRate / 12;
                    const compoundFactor = Math.pow(1 + monthlyRate, totalMonths) - 1;
                    const saveCompound = Math.round(totalFund * (monthlyRate / compoundFactor));

                    // 填入基礎資料
                    document.getElementById('res-years-to-retire').innerText = yearsToRetire;
                    document.getElementById('res-retirement-years').innerText = retirementYears;
                    document.getElementById('res-total-fund').innerText = totalFund.toLocaleString();

                    // 填入新功能：每月儲蓄金額
                    document.getElementById('res-save-flat').innerText = saveFlat.toLocaleString();
                    document.getElementById('res-save-compound').innerText = saveCompound.toLocaleString();

                    resultArea.classList.add('active');
                } else {
                    resultArea.classList.remove('active');
                }
            }

            calculateRetirement();
        });
    </script>
</body>
</html>
